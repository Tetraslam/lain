name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  binary-e2e:
    name: binary build + web e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the single binary
        run: pnpm build:binary

      - name: Smoke test the binary
        run: |
          ./dist-bin/lain-linux-x64 version
          ./dist-bin/lain-linux-x64 doctor || true   # no creds in CI
          ./dist-bin/lain-linux-x64 help | head -1

      - name: Install Chromium for Playwright
        run: pnpm --filter @lain/web exec playwright install --with-deps chromium

      - name: Web E2E (source server + fixture db)
        run: pnpm --filter @lain/web test:e2e

      - name: Web E2E (against the compiled binary's serve)
        run: |
          mkdir -p "$RUNNER_TEMP/ws"
          ./dist-bin/lain-linux-x64 serve "$RUNNER_TEMP/ws" --port 7799 &
          for i in $(seq 1 40); do curl -sf http://localhost:7799/api/explorations >/dev/null && break; sleep 0.5; done
          LAIN_E2E_URL=http://localhost:7799 pnpm --filter @lain/web test:e2e

  install-smoke:
    name: install script smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Runs the real installer (build + launcher on PATH), then smoke-checks
      # the installed CLI end to end. No network/LLM calls are made.
      - name: Run install.sh
        run: LAIN_BIN_DIR="$HOME/.local/bin" bash install.sh

      - name: Smoke test the installed CLI
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          lain version
          lain doctor || true   # exit code is informational (no creds in CI)
          lain help | head -1
          lain mcp list
